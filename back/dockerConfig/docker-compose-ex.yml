#Example file for your docker-compose when connecting the bdd
services:
    mongodb:
        image: mongo:7.0
        container_name: mongodb_genoa
        restart: always
        ports:
            - "27017:27017"
        volumes:
            - mongodb:/data/db
        environment:
            MONGO_INITDB_ROOT_USERNAME: admin
            MONGO_INITDB_ROOT_PASSWORD: password

volumes:
    mongodb:
        external: true
